<!doctype html>
<html>
    <head>
        <style>
            #divStatic{
                background-color: aqua;
                width: 300px;
                height: 30px;
                position: static;
                top:20px;
                left:20px
            }
            #divRelative{
                background-color: orange;
                width: 300px;
                height: 30px;
                position: relative;
                top:300px;
                left:100px

            }
            #divAbsolute{
                background-color: lightblue;
                width: 300px;
                height: 30px;
                position: absolute;
                top:1050px;
                left:150px
            }
            #divFixed{
                background-color: greenyellow;
                width: 300px;
                height: 30px;
                position: fixed;
                top:50px;
                left:150px
            }
        </style>

    </head>
    <body>
        <div id="divStatic">Div 1 (Static)</div>
        <div id="divRelative">Div 2 (Relative)</div>
        <div id="divAbsolute">Div 3 (Absolute)</div>
        <div id="divFixed">Div 4 (Fixed)</div>
    </body>
</html>
