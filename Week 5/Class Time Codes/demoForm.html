<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Form Elements Demo</title>
</head>
<body>

<h1>Form Elements Demo</h1>

<div>

    <form>

        <!-- TEXT INPUT -->
        <div>
            <label>Full Name:</label>
            <input type="text" placeholder="Enter your name">
        </div>

        <!-- EMAIL -->
        <div>
            <label>Email Address:</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <!-- PASSWORD -->
        <div>
            <label>Password:</label>
            <input type="password" placeholder="Enter password">
        </div>

        <!-- NUMBER -->
        <div>
            <label>Age:</label>
            <input type="number" min="1" max="100">
        </div>

        <!-- DATE -->
        <div>
            <label>Date of Birth:</label>
            <input type="date">
        </div>

        <!-- RADIO -->
        <div>
            <label>Gender:</label>
            <div>
                <label><input type="radio" name="gender"> Male</label>
                <label><input type="radio" name="gender"> Female</label>
                <label><input type="radio" name="gender"> Other</label>
            </div>
        </div>

        <!-- CHECKBOX -->
        <div>
            <label>Hobbies:</label>
            <div>
                <label><input type="checkbox"> Reading</label>
                <label><input type="checkbox"> Sports</label>
                <label><input type="checkbox"> Music</label>
            </div>
        </div>

        <!-- SELECT -->
        <div>
            <label>Country:</label>
            <select>
                <option>United States</option>
                <option>Canada</option>
                <option>India</option>
                <option>Other</option>
            </select>
        </div>

        <!-- TEXTAREA -->
        <div>
            <label>Bio / About You:</label>
            <textarea rows="4" placeholder="Write something..."></textarea>
        </div>

        <!-- FILE -->
        <div>
            <label>Upload Profile Picture:</label>
            <input type="file">
        </div>

        <!-- RANGE -->
        <div>
            <label>Volume Level:</label>
            <input type="range" min="0" max="100">
        </div>

        <!-- SUBMIT + RESET -->
        <div>
            <input type="submit" value="Submit Form">
            <input type="reset" value="Reset">
        </div>

    </form>

</div>

</body>
</html>
