<!DOCTYPE html>
<html>
<head>
    <title>Simple Examples</title>
</head>
<body style="font-family: Arial; padding: 20px;">

    <!-- MAX-WIDTH -->
    <h2>max-width</h2>
    <div style="width: 80%; max-width: 300px; padding: 10px; background: lightblue; border: 1px solid black;">
        I will grow, but never bigger than 300px.
    </div>

    <!-- MIN-WIDTH -->
    <h2>min-width</h2>
    <div style="width: 20%; min-width: 200px; padding: 10px; background: lightgreen; border: 1px solid black;">
        I will shrink, but never smaller than 200px.
    </div>

    <!-- OBJECT-FIT -->
    <h2>object-fit</h2>
    <div style="width: 200px; height: 150px; border: 1px solid black;">
        <img 
            src="https://media.istockphoto.com/id/814423752/photo/eye-of-model-with-colorful-art-make-up-close-up.jpg?s=612x612&w=0&k=20&c=l15OdMWjgCKycMMShP8UK94ELVlEGvt7GmB_esHWPYE=" 
            style="width: 100%; height: 100%; object-fit: contain;">
    </div>
    <p>This image uses <strong>object-fit: cover</strong>.</p>

</body>
</html>
