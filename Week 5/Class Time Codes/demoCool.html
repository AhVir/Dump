<!DOCTYPE html>
<html>
<head>
    <title>Design Helpful Properties</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px;">

    <h1>Design Helpful Properties Demo</h1>

    <!-- Box Shadow -->
    <div 
        style="
            width: 200px;
            padding: 20px;
            margin-bottom: 20px;
            background: #e8f0ff;
            border: 1px solid #ccc;
            box-shadow: 3px 3px 10px rgb(239, 3, 3);
        ">
        <strong>box-shadow</strong><br><br>
        This box has a shadow, making it look lifted.
    </div>

    <!-- Opacity -->
    <div 
        style="
            width: 200px;
            padding: 20px;
            margin-bottom: 20px;
            background: #ffe8e8;
            border: 1px solid #ccc;
            opacity: 0.5;
        ">
        <strong>opacity: 0.6</strong><br><br>
        This box looks faded because it is partly transparent.
    </div>

    <!-- Cursor -->
    <div 
        style="
            width: 200px;
            padding: 20px;
            margin-bottom: 20px;
            background: #e8ffe8;
            border: 1px solid #ccc;
            cursor: grabbing;
        ">
        <strong>cursor: pointer</strong><br><br>
        Hover over me — the cursor changes to a hand.
    </div>

</body>
</html>
